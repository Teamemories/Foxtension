name: Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          node-version: 26

      - name: Run Semgrep scan
        uses: returntocorp/semgrep-action@v2
        with:
          config: p/owasp-top-ten
