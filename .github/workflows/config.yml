name: PR Control

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR Template Structure
        env:
          BODY: ${{ github.event.pull_request.body }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -e

          echo "Checking PR body..."

          if [ -z "$BODY" ]; then
            echo "::error::PR body is empty"
            exit 1
          fi

          CLEAN_BODY=$(echo "$BODY" | tr -d '[:space:]')

          if [ -z "$CLEAN_BODY" ]; then
            echo "::error::PR body contains only whitespace"
            exit 1
          fi

          echo "Detecting PR type..."

          if echo "$TITLE" | grep -qi "bug"; then
            TYPE="bug"
          elif echo "$TITLE" | grep -qi "feature"; then
            TYPE="feature"
          elif echo "$TITLE" | grep -qi "doc"; then
            TYPE="docs"
          elif echo "$TITLE" | grep -qi "security"; then
            TYPE="security"
          else
            TYPE="general"
          fi

          echo "Detected type: $TYPE"

          check_section() {
            if ! echo "$BODY" | grep -Fq "$1"; then
              echo "::error::Missing required section: $1"
              exit 1
            fi
          }

          check_checkbox() {
            if ! echo "$BODY" | grep -Fq "- [x] $1" && ! echo "$BODY" | grep -Fq "- [X] $1"; then
              echo "::error::Required checklist item not checked: $1"
              exit 1
            fi
          }

          # Shared required sections
          check_section "**Related Issues**"
          check_section "**Checklist**"

          # Type-specific validation
          case "$TYPE" in

            bug)
              check_section "**Bug Description**"
              check_section "**Root Cause**"
              check_section "**Fix Description**"
              check_section "**Verification**"
              ;;

            feature)
              check_section "**Feature Description**"
              check_section "**Motivation**"
              check_section "**Implementation Details**"
              check_section "**Testing**"
              ;;

            docs)
              check_section "**Summary**"
              check_section "**Reason**"
              check_section "**Affected Documentation**"
              ;;

            security)
              check_section "**Summary**"
              check_section "**Vulnerability Addressed**"
              check_section "**Impact**"
              check_section "**Testing**"
              check_section "**Disclosure**"
              ;;

            general)
              check_section "**Description**"
              check_section "**Type of Change**"
              check_section "**Changes Made**"
              check_section "**Testing**"
              ;;

          esac

          # Ensure user removed placeholder hints
          if echo "$BODY" | grep -Fq "> Describe"; then
            echo "::error::Template placeholders not filled"
            exit 1
          fi

          if echo "$BODY" | grep -Fq "- Closes #"; then
            echo "::error::Issue reference not completed"
            exit 1
          fi

          echo "PR validation passed successfully."
