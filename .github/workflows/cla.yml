name: CLA Assistant Lite

on:
  pull_request:
    types: [opened, synchronize]
    
  permissions:
  contents: read
  packages: read

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: cla-assistant/github-action@v2
        with:
          repo-token: ${{ secrets.CLA_ASSISTANT_TOKEN }}
          path-to-cla: 'CLA.md'
