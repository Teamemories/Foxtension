name: Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit

        Please verify that:

        - You are using the latest version.
        - The issue has not already been reported.
        - You can reproduce the problem consistently.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem.
      placeholder: Application crashes when opening settings
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide clear reproduction steps.
      placeholder: |
        1. Open the application
        2. Navigate to Settings
        3. Click "Advanced"
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Error Messages
      description: Paste logs, stack traces, or screenshots.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the issue?
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Development
        - Staging
        - Production
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Application Version
      placeholder: v1.2.3
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11 24H2

  - type: input
    id: runtime
    attributes:
      label: Runtime / Framework Version
      placeholder: .NET 9.0

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information.
